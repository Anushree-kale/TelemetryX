services:
  db:
    image: postgres:15-alpine
    container_name: telemetryx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetryx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemetryx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telemetryx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemetryx-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/telemetryx
      - REDIS_URL=redis://redis:6379/0
      # Local dev: omit ADMIN_KEY to use the dev fallback. Production: set TELEMETRYX_ENV=production and a strong ADMIN_KEY (API will not start without it).
      - TELEMETRYX_ENV=${TELEMETRYX_ENV:-development}
      - ADMIN_KEY=${ADMIN_KEY:-}
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      - TELEMETRYX_API_KEYS=${TELEMETRYX_API_KEYS:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - ANALYSIS_CACHE_TTL=3600
      - CELERY_VISIBILITY_TIMEOUT=${CELERY_VISIBILITY_TIMEOUT:-14400}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemetryx-worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/telemetryx
      - REDIS_URL=redis://redis:6379/0
      - ANALYSIS_CACHE_TTL=3600
      - CELERY_VISIBILITY_TIMEOUT=${CELERY_VISIBILITY_TIMEOUT:-14400}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
