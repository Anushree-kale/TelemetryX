name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: telemetryx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d telemetryx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/telemetryx
      REDIS_URL: redis://localhost:6379/0
      AUTH_DISABLED: "1"
      TELEMETRYX_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run fast test suite
        working-directory: backend
        run: pytest -m "not slow" -v --tb=short

      - name: Run slow synthesis tests
        working-directory: backend
        run: pytest -m slow -v --tb=short

