databases:
  - name: telemetryx-db
    plan: free
    databaseName: telemetryx
    user: telemetryx

services:
  # Redis Cache & Celery Broker
  - type: redis
    name: telemetryx-redis
    plan: free
    ipAllowList: [] # Restrict access to internal network only

  # FastAPI API Web Service
  - type: web
    name: telemetryx-api
    plan: free
    env: docker
    dockerContext: ./backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: TELEMETRYX_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telemetryx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: telemetryx-redis
          property: connectionString
      - key: ADMIN_KEY
        generateValue: true
      - key: AUTH_DISABLED
        value: "true"
      - key: ANALYSIS_CACHE_TTL
        value: "3600"
      - key: CELERY_VISIBILITY_TIMEOUT
        value: "14400"

  # Celery Worker
  - type: worker
    name: telemetryx-worker
    plan: starter # Background workers do not have a free tier on Render
    env: docker
    dockerContext: ./backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: TELEMETRYX_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telemetryx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: telemetryx-redis
          property: connectionString
      - key: ANALYSIS_CACHE_TTL
        value: "3600"
      - key: CELERY_VISIBILITY_TIMEOUT
        value: "14400"
